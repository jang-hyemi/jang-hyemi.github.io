about_content: | # this will include new lines to allow paragraphs
  추상적인 코드보다 물리적 공간에서 실물과 상호작용하는 임베디드 분야에 깊은 애정을 느낍니다. 하드웨어를 제어하며 사물에 생명력을 불어넣는 과정은 제게 명상과 같은 평온함을 줍니다. 이러한 섬세함은 사람 관계에서도 이어집니다. 외국인 유학생 친구들의 문화를 존중하며, 번역기를 활용한 정확한 정보 전달과 상대의 모국어를 배우는 적극성으로 소통의 장벽을 허물어왔습니다. 기술과 사람, 서로 다른 문화 사이에서 오류 없는 가교 역할을 수행하며 신뢰할 수 있는 시스템을 구축하는 개발자가 되겠습니다.
  |||
  I am most skilled in: bridging hardware and software through <mark>Embedded Systems</mark> with precise spatial control and meticulous, culturally-aware communication.

content: 
  - title: 포트폴리오 # Title for the section
